version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jap-postgres
    environment:
      POSTGRES_USER: jap_user
      POSTGRES_PASSWORD: jap_password
      POSTGRES_DB: jap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jap_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
